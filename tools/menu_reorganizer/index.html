<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRMod Menu Reorganizer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

/* Header */
.header { background: #16213e; padding: 8px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 2px solid #0f3460; }
.header h1 { font-size: 16px; color: #e94560; flex-shrink: 0; }
.header-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.header-actions button { background: #0f3460; color: #e0e0e0; border: 1px solid #1a3a6e; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; white-space: nowrap; }
.header-actions button:hover { background: #1a4a7e; }
.header-actions button.danger { border-color: #e94560; }
.header-actions button.danger:hover { background: #e94560; color: #fff; }
.header-actions button.export { background: #0a6640; border-color: #0d8050; }
.header-actions button.export:hover { background: #0d8050; }

/* Main layout */
.main { display: flex; flex: 1; overflow: hidden; }

/* Left panel - Menu Tree */
.tree-panel { width: 340px; min-width: 280px; border-right: 2px solid #0f3460; display: flex; flex-direction: column; background: #16213e; }
.tree-panel h2 { font-size: 13px; padding: 8px 12px; background: #0f3460; color: #a0c4ff; }
.tree-container { flex: 1; overflow-y: auto; padding: 4px; }

/* Tree nodes */
.tree-node { user-select: none; }
.tree-node-header { display: flex; align-items: center; padding: 3px 6px; border-radius: 3px; cursor: grab; gap: 4px; font-size: 13px; margin: 1px 0; }
.tree-node-header:hover { background: rgba(233, 69, 96, 0.15); }
.tree-node-header.selected { background: rgba(233, 69, 96, 0.3); outline: 1px solid #e94560; }
.tree-node-header.drag-over-above { border-top: 2px solid #e94560; }
.tree-node-header.drag-over-inside { background: rgba(233, 69, 96, 0.25); outline: 1px dashed #e94560; }
.tree-node-header.drag-over-below { border-bottom: 2px solid #e94560; }
.tree-node-header .toggle { width: 16px; text-align: center; font-size: 10px; color: #888; flex-shrink: 0; cursor: pointer; }
.tree-node-header .icon { width: 16px; text-align: center; flex-shrink: 0; }
.tree-node-header .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tree-node-header .badge { font-size: 10px; background: #0f3460; padding: 1px 5px; border-radius: 8px; color: #888; flex-shrink: 0; }
.tree-node-children { padding-left: 16px; }
.tree-node-children.collapsed { display: none; }

/* Node type colors */
.node-root-tab .name { color: #e94560; font-weight: bold; }
.node-subtab .name { color: #a0c4ff; }
.node-item .name { color: #c0c0c0; font-size: 12px; }
.node-section .name { color: #e9a045; font-size: 12px; font-style: italic; }

/* Right panel - Details & Preview */
.detail-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.detail-panel h2 { font-size: 13px; padding: 8px 12px; background: #0f3460; color: #a0c4ff; }

/* Preview area */
.preview-area { flex: 1; overflow-y: auto; padding: 16px; }
.preview-menu { background: #2a2a3e; border: 1px solid #444; border-radius: 6px; max-width: 560px; }
.preview-titlebar { background: #333; padding: 6px 12px; border-radius: 6px 6px 0 0; font-size: 13px; color: #ccc; display: flex; justify-content: space-between; }
.preview-tabs { display: flex; flex-wrap: wrap; gap: 2px; padding: 4px; background: #252538; border-bottom: 1px solid #444; }
.preview-tab { padding: 5px 10px; background: #1e1e30; border: 1px solid #444; border-bottom: none; border-radius: 4px 4px 0 0; font-size: 12px; color: #aaa; cursor: pointer; white-space: nowrap; }
.preview-tab:hover { background: #2a2a4e; }
.preview-tab.active { background: #2a2a3e; color: #e94560; border-color: #e94560; }
.preview-content { padding: 12px; min-height: 200px; }
.preview-subtabs { display: flex; flex-wrap: wrap; gap: 2px; padding: 0 0 8px 0; border-bottom: 1px solid #333; margin-bottom: 8px; }
.preview-subtab { padding: 3px 8px; background: #1e1e30; border: 1px solid #333; border-radius: 3px; font-size: 11px; color: #888; cursor: pointer; }
.preview-subtab.active { color: #a0c4ff; border-color: #a0c4ff; }
.preview-item { padding: 3px 8px; font-size: 12px; color: #aaa; border-left: 2px solid #333; margin: 2px 0; }
.preview-item.section-header { color: #e9a045; border-left-color: #e9a045; font-weight: bold; }
.preview-footer { display: flex; justify-content: space-between; padding: 6px 12px; background: #252538; border-top: 1px solid #444; border-radius: 0 0 6px 6px; font-size: 11px; color: #666; }

/* Export panel */
.export-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a2e; border: 2px solid #0f3460; border-radius: 8px; padding: 20px; z-index: 100; width: 80%; max-width: 700px; max-height: 80vh; }
.export-panel.visible { display: block; }
.export-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 99; }
.export-overlay.visible { display: block; }
.export-panel h3 { color: #e94560; margin-bottom: 12px; }
.export-panel textarea { width: 100%; height: 50vh; background: #0a0a1a; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; padding: 10px; font-family: 'Consolas', monospace; font-size: 12px; resize: none; }
.export-panel .btn-row { display: flex; gap: 8px; margin-top: 10px; }
.export-panel button { padding: 6px 16px; border-radius: 4px; cursor: pointer; border: 1px solid #333; font-size: 13px; }

/* Rename input */
.rename-input { background: #0a0a1a; color: #e0e0e0; border: 1px solid #e94560; padding: 2px 4px; font-size: 12px; width: 150px; border-radius: 2px; }

/* Status bar */
.status-bar { background: #0f3460; padding: 4px 12px; font-size: 11px; color: #888; display: flex; justify-content: space-between; }

/* Custom Modal (replaces prompt/confirm) */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 200; }
.modal-overlay.visible { display: flex; align-items: center; justify-content: center; }
.modal-box { background: #1a1a2e; border: 2px solid #0f3460; border-radius: 8px; padding: 20px; min-width: 320px; max-width: 450px; }
.modal-box h3 { color: #a0c4ff; margin-bottom: 12px; font-size: 14px; }
.modal-box input { width: 100%; background: #0a0a1a; color: #e0e0e0; border: 1px solid #444; border-radius: 4px; padding: 8px; font-size: 14px; margin-bottom: 12px; }
.modal-box input:focus { outline: none; border-color: #e94560; }
.modal-box .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-box button { padding: 6px 16px; border-radius: 4px; cursor: pointer; border: 1px solid #333; font-size: 13px; }
.modal-box .btn-ok { background: #0f3460; color: #e0e0e0; }
.modal-box .btn-ok:hover { background: #1a4a7e; }
.modal-box .btn-cancel { background: #333; color: #ccc; }
.modal-box .btn-cancel:hover { background: #555; }
.modal-box .btn-danger { background: #e94560; color: #fff; border-color: #e94560; }
.modal-box .btn-danger:hover { background: #c0334a; }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #1a1a2e; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #555; }
</style>
</head>
<body>

<div class="header">
  <h1>VRMod Menu Reorganizer</h1>
  <div class="header-actions">
    <button onclick="addRootTab()">+ Tab</button>
    <button onclick="addSubtab()">+ Subtab</button>
    <button onclick="renameSelected()">Rename</button>
    <button onclick="moveUp()">Up</button>
    <button onclick="moveDown()">Down</button>
    <button onclick="duplicateSelected()">Duplicate</button>
    <button class="danger" onclick="deleteSelected()">Delete</button>
    <button onclick="resetAll()">Reset</button>
    <button class="export" onclick="showExport()">Export for Claude</button>
  </div>
</div>

<div class="main">
  <div class="tree-panel">
    <h2>Menu Structure (Drag to Reorder)</h2>
    <div class="tree-container" id="treeContainer"></div>
  </div>
  <div class="detail-panel">
    <h2>Preview - VRMod Menu</h2>
    <div class="preview-area" id="previewArea"></div>
  </div>
</div>

<div class="status-bar">
  <span id="statusLeft">Click a tab to select. Drag to move.</span>
  <span id="statusRight">Root Tabs: <span id="rootTabCount">0</span> | Total Items: <span id="totalCount">0</span></span>
</div>

<!-- Custom Modal (replaces prompt/confirm) -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <h3 id="modalTitle">Title</h3>
    <input type="text" id="modalInput" style="display:none" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="modalCancel()">Cancel</button>
      <button class="btn-ok" id="modalOkBtn" onclick="modalOk()">OK</button>
    </div>
  </div>
</div>

<div class="export-overlay" id="exportOverlay" onclick="hideExport()"></div>
<div class="export-panel" id="exportPanel">
  <h3>Export for Claude Code</h3>
  <p style="font-size:12px;color:#888;margin-bottom:8px;">Copy the text below and paste it into Claude Code conversation.</p>
  <textarea id="exportText" readonly></textarea>
  <div class="btn-row">
    <button onclick="copyExport()" style="background:#0a6640;color:#fff;">Copy to Clipboard</button>
    <button onclick="hideExport()" style="background:#333;color:#ccc;">Close</button>
  </div>
</div>

let menuData = JSON.parse(JSON.stringify(ORIGINAL_DATA));
let selectedNodeId = null;
let draggedNodeId = null;
let idCounter = 1000;

function genId() { return '_new_' + (idCounter++); }

// Deep clone
function cloneData(d) { return JSON.parse(JSON.stringify(d)); }

// ============================================================
// TREE OPERATIONS
// ============================================================

// Find node and its parent array by ID
function findNode(id, nodes, parent) {
  for (let i = 0; i < nodes.length; i++) {
    if (nodes[i].id === id) return { node: nodes[i], siblings: nodes, index: i, parent: parent };
    if (nodes[i].children) {
      const r = findNode(id, nodes[i].children, nodes[i]);
      if (r) return r;
    }
  }
  return null;
}

// Count all nodes
function countAll(nodes) {
  let c = 0;
  for (const n of nodes) {
    c++;
    if (n.children) c += countAll(n.children);
  }
  return c;
}

// ============================================================
// RENDER TREE
// ============================================================
const collapsedSet = new Set();

function renderTree() {
  const container = document.getElementById('treeContainer');
  container.innerHTML = '';
  menuData.forEach(node => container.appendChild(createTreeNode(node, 0)));
  document.getElementById('rootTabCount').textContent = menuData.length;
  document.getElementById('totalCount').textContent = countAll(menuData);
}

function createTreeNode(node, depth) {
  const div = document.createElement('div');
  div.className = 'tree-node';
  div.dataset.id = node.id;

  const header = document.createElement('div');
  header.className = 'tree-node-header';
  if (node.type === 'root_tab') header.classList.add('node-root-tab');
  else if (node.type === 'subtab') header.classList.add('node-subtab');
  else if (node.type === 'section') header.classList.add('node-section');
  else header.classList.add('node-item');

  if (node.id === selectedNodeId) header.classList.add('selected');

  const hasChildren = node.children && node.children.length > 0;
  const isCollapsed = collapsedSet.has(node.id);

  // Toggle
  const toggle = document.createElement('span');
  toggle.className = 'toggle';
  toggle.textContent = hasChildren ? (isCollapsed ? '\u25B6' : '\u25BC') : '';
  toggle.onclick = (e) => { e.stopPropagation(); toggleCollapse(node.id); };
  header.appendChild(toggle);

  // Icon
  const icon = document.createElement('span');
  icon.className = 'icon';
  if (node.type === 'root_tab') icon.textContent = '\uD83D\uDCC1';
  else if (node.type === 'subtab') icon.textContent = '\uD83D\uDCC4';
  else if (node.type === 'section') icon.textContent = '\uD83D\uDD36';
  else icon.textContent = '\u2699';
  header.appendChild(icon);

  // Name
  const name = document.createElement('span');
  name.className = 'name';
  name.textContent = node.name;
  header.appendChild(name);

  // Badge
  if (hasChildren) {
    const badge = document.createElement('span');
    badge.className = 'badge';
    badge.textContent = node.children.length;
    header.appendChild(badge);
  }
  if (node.note) {
    const warn = document.createElement('span');
    warn.className = 'badge';
    warn.style.background = '#e94560';
    warn.style.color = '#fff';
    warn.textContent = '!';
    warn.title = node.note;
    header.appendChild(warn);
  }

  // Click to select
  header.onclick = (e) => { e.stopPropagation(); selectNode(node.id); };
  // Double click to rename
  header.ondblclick = (e) => { e.stopPropagation(); renameNode(node.id, name); };

  // Drag & Drop
  header.draggable = true;
  header.ondragstart = (e) => {
    draggedNodeId = node.id;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', node.id);
    setTimeout(() => header.style.opacity = '0.4', 0);
  };
  header.ondragend = () => { header.style.opacity = '1'; clearDropIndicators(); };
  header.ondragover = (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    clearDropIndicators();
    const rect = header.getBoundingClientRect();
    const y = e.clientY - rect.top;
    const zone = y / rect.height;
    if (zone < 0.25) header.classList.add('drag-over-above');
    else if (zone > 0.75) header.classList.add('drag-over-below');
    else header.classList.add('drag-over-inside');
  };
  header.ondragleave = () => { clearDropIndicators(); };
  header.ondrop = (e) => {
    e.preventDefault();
    clearDropIndicators();
    if (!draggedNodeId || draggedNodeId === node.id) return;
    const rect = header.getBoundingClientRect();
    const y = e.clientY - rect.top;
    const zone = y / rect.height;
    if (zone < 0.25) dropNode(draggedNodeId, node.id, 'above');
    else if (zone > 0.75) dropNode(draggedNodeId, node.id, 'below');
    else dropNode(draggedNodeId, node.id, 'inside');
    draggedNodeId = null;
  };

  div.appendChild(header);

  // Children
  if (hasChildren) {
    const childDiv = document.createElement('div');
    childDiv.className = 'tree-node-children' + (isCollapsed ? ' collapsed' : '');
    node.children.forEach(child => childDiv.appendChild(createTreeNode(child, depth + 1)));
    div.appendChild(childDiv);
  }

  return div;
}

function clearDropIndicators() {
  document.querySelectorAll('.drag-over-above,.drag-over-inside,.drag-over-below')
    .forEach(el => el.classList.remove('drag-over-above', 'drag-over-inside', 'drag-over-below'));
}

function toggleCollapse(id) {
  if (collapsedSet.has(id)) collapsedSet.delete(id);
  else collapsedSet.add(id);
  renderTree();
}

function selectNode(id) {
  selectedNodeId = id;
  renderTree();
  renderPreview();
}

// ============================================================
// DROP LOGIC
// ============================================================
function dropNode(dragId, targetId, position) {
  if (dragId === targetId) return;
  // Check not dropping parent into child
  const dragInfo = findNode(dragId, menuData, null);
  if (!dragInfo) return;
  // Check if target is descendant of dragged
  if (dragInfo.node.children) {
    const targetInDrag = findNode(targetId, dragInfo.node.children, dragInfo.node);
    if (targetInDrag) { setStatus('Cannot drop a parent into its own child!'); return; }
  }
  const targetInfo = findNode(targetId, menuData, null);
  if (!targetInfo) return;
  // Remove from original position
  dragInfo.siblings.splice(dragInfo.index, 1);
  // Re-find target (indices may have shifted)
  const targetInfo2 = findNode(targetId, menuData, null);
  if (!targetInfo2) { menuData = cloneData(ORIGINAL_DATA); renderTree(); return; }
  if (position === 'inside') {
    if (!targetInfo2.node.children) targetInfo2.node.children = [];
    targetInfo2.node.children.push(dragInfo.node);
    collapsedSet.delete(targetId);
  } else if (position === 'above') {
    targetInfo2.siblings.splice(targetInfo2.index, 0, dragInfo.node);
  } else {
    targetInfo2.siblings.splice(targetInfo2.index + 1, 0, dragInfo.node);
  }
  setStatus(`Moved "${dragInfo.node.name}" ${position} "${targetInfo2.node.name}"`);
  renderTree();
  renderPreview();
}

// ============================================================
// CUSTOM MODAL (replaces prompt/confirm)
// ============================================================
let modalResolve = null;

function showModal(title, defaultValue, isDanger) {
  return new Promise((resolve) => {
    modalResolve = resolve;
    document.getElementById('modalTitle').textContent = title;
    const input = document.getElementById('modalInput');
    const okBtn = document.getElementById('modalOkBtn');
    if (defaultValue !== null) {
      input.style.display = 'block';
      input.value = defaultValue;
      okBtn.textContent = 'OK';
      okBtn.className = 'btn-ok';
    } else {
      input.style.display = 'none';
      okBtn.textContent = isDanger ? 'Delete' : 'OK';
      okBtn.className = isDanger ? 'btn-danger' : 'btn-ok';
    }
    document.getElementById('modalOverlay').classList.add('visible');
    if (defaultValue !== null) { input.focus(); input.select(); }
  });
}

function modalOk() {
  const input = document.getElementById('modalInput');
  const val = input.style.display !== 'none' ? input.value.trim() : true;
  document.getElementById('modalOverlay').classList.remove('visible');
  if (modalResolve) { modalResolve(val); modalResolve = null; }
}

function modalCancel() {
  document.getElementById('modalOverlay').classList.remove('visible');
  if (modalResolve) { modalResolve(null); modalResolve = null; }
}

// Enter key in modal input
document.addEventListener('keydown', (e) => {
  if (document.getElementById('modalOverlay').classList.contains('visible')) {
    if (e.key === 'Enter') { e.preventDefault(); modalOk(); }
    if (e.key === 'Escape') { e.preventDefault(); modalCancel(); }
  }
});

async function addRootTab() {
  const name = await showModal('New root tab name:', 'New Tab');
  if (!name) return;
  menuData.push({ id: genId(), name: name, type: 'root_tab', source: '(new)', children: [] });
  renderTree(); renderPreview();
}

async function addSubtab() {
  if (!selectedNodeId) { setStatus('Select a root tab first'); return; }
  const info = findNode(selectedNodeId, menuData, null);
  if (!info) return;
  const target = (info.node.type === 'root_tab' || info.node.type === 'subtab') ? info.node : null;
  if (!target) { setStatus('Select a tab or subtab to add under'); return; }
  const name = await showModal('New subtab name:', 'New Subtab');
  if (!name) return;
  if (!target.children) target.children = [];
  target.children.push({ id: genId(), name: name, type: 'subtab', children: [] });
  collapsedSet.delete(target.id);
  renderTree(); renderPreview();
}

async function renameSelected() {
  if (!selectedNodeId) { setStatus('Select a node first'); return; }
  const info = findNode(selectedNodeId, menuData, null);
  if (!info) return;
  const name = await showModal('New name:', info.node.name);
  if (!name) return;
  info.node.name = name;
  renderTree(); renderPreview();
}

function renameNode(id, nameEl) {
  const info = findNode(id, menuData, null);
  if (!info) return;
  const input = document.createElement('input');
  input.className = 'rename-input';
  input.value = info.node.name;
  nameEl.replaceWith(input);
  input.focus();
  input.select();
  const finish = () => {
    if (input.value.trim()) info.node.name = input.value.trim();
    renderTree(); renderPreview();
  };
  input.onblur = finish;
  input.onkeydown = (e) => { if (e.key === 'Enter') finish(); if (e.key === 'Escape') { renderTree(); } };
}

async function deleteSelected() {
  if (!selectedNodeId) { setStatus('Select a node first'); return; }
  const info = findNode(selectedNodeId, menuData, null);
  if (!info) return;
  const ok = await showModal(`Delete "${info.node.name}"?`, null, true);
  if (!ok) return;
  info.siblings.splice(info.index, 1);
  selectedNodeId = null;
  setStatus(`Deleted "${info.node.name}"`);
  renderTree(); renderPreview();
}

function duplicateSelected() {
  if (!selectedNodeId) { setStatus('Select a node first'); return; }
  const info = findNode(selectedNodeId, menuData, null);
  if (!info) return;
  const dup = cloneData(info.node);
  dup.id = genId();
  dup.name += ' (copy)';
  // Re-assign IDs for children
  function reId(n) { n.id = genId(); if (n.children) n.children.forEach(reId); }
  if (dup.children) dup.children.forEach(reId);
  info.siblings.splice(info.index + 1, 0, dup);
  renderTree(); renderPreview();
}

function moveUp() {
  if (!selectedNodeId) return;
  const info = findNode(selectedNodeId, menuData, null);
  if (!info || info.index === 0) return;
  [info.siblings[info.index - 1], info.siblings[info.index]] = [info.siblings[info.index], info.siblings[info.index - 1]];
  renderTree();
}

function moveDown() {
  if (!selectedNodeId) return;
  const info = findNode(selectedNodeId, menuData, null);
  if (!info || info.index >= info.siblings.length - 1) return;
  [info.siblings[info.index], info.siblings[info.index + 1]] = [info.siblings[info.index + 1], info.siblings[info.index]];
  renderTree();
}

async function resetAll() {
  const ok = await showModal('Reset to original structure?', null, false);
  if (!ok) return;
  menuData = cloneData(ORIGINAL_DATA);
  selectedNodeId = null;
  collapsedSet.clear();
  renderTree(); renderPreview();
  setStatus('Reset to original structure');
}

function renderPreview() {

  let html = '<div class="preview-menu">';
  html += '<div class="preview-titlebar"><span>VRMod Menu</span><span style="font-size:11px">550x600</span></div>';
  // Root tabs
  html += '<div class="preview-tabs">';
  menuData.forEach((tab, i) => {
    const active = i === previewActiveRoot ? ' active' : '';
    html += `<div class="preview-tab${active}" onclick="setPreviewTab(${i})">${tab.name}</div>`;
  });
  html += '</div>';
  // Active tab content
  const activeTab = menuData[previewActiveRoot];
  if (activeTab) {
    html += '<div class="preview-content">';
    if (activeTab.children && activeTab.children.length > 0) {
      const hasSubtabs = activeTab.children.some(c => c.type === 'subtab');
      if (hasSubtabs) {
        html += '<div class="preview-subtabs">';
        activeTab.children.forEach((st, j) => {
          const cls = j === 0 ? ' active' : '';
          html += `<div class="preview-subtab${cls}">${st.name}</div>`;
        });
        html += '</div>';
        // Show first subtab's items
        const firstSub = activeTab.children[0];
        if (firstSub && firstSub.children) {
          firstSub.children.forEach(item => {
            const cls = item.type === 'section' ? ' section-header' : '';
            html += `<div class="preview-item${cls}">${item.name}${item.convar ? ' <span style="color:#555;font-size:10px">[' + item.convar + ']</span>' : ''}</div>`;
          });
        }
      } else {
        activeTab.children.forEach(item => {
          const cls = item.type === 'section' ? ' section-header' : '';
          html += `<div class="preview-item${cls}">${item.name}${item.convar ? ' <span style="color:#555;font-size:10px">[' + item.convar + ']</span>' : ''}</div>`;
        });
      }
    } else {
      html += '<div style="color:#555;font-style:italic;padding:20px">Empty tab</div>';
    }
    html += '</div>';
  }
  html += '<div class="preview-footer"><span>Addon version: semioffcial</span><span>[Start] [Exit]</span></div>';
  html += '</div>';
  area.innerHTML = html;
}

function setPreviewTab(i) {

  renderPreview();
}

// ============================================================
// EXPORT
// ============================================================
function showExport() {
  const original = cloneData(ORIGINAL_DATA);
  const current = cloneData(menuData);
  // Build diff summary
  const changes = [];
  // Compare root tab names and order
  const origNames = original.map(t => t.name);
  const currNames = current.map(t => t.name);
  if (JSON.stringify(origNames) !== JSON.stringify(currNames)) {
    changes.push(`Root tabs changed: [${origNames.join(', ')}] -> [${currNames.join(', ')}]`);
  }
  // Find moved/deleted/added
  const origIds = new Set();
  function collectIds(nodes) { nodes.forEach(n => { origIds.add(n.id); if (n.children) collectIds(n.children); }); }
  collectIds(original);
  const currIds = new Set();
  function collectCurrIds(nodes) { nodes.forEach(n => { currIds.add(n.id); if (n.children) collectCurrIds(n.children); }); }
  collectCurrIds(current);
  const deleted = [...origIds].filter(id => !currIds.has(id));
  const added = [...currIds].filter(id => !origIds.has(id));
  if (deleted.length) {
    deleted.forEach(id => {
      const info = findNodeIn(id, original);
      if (info) changes.push(`DELETED: "${info.name}"`);
    });
  }
  if (added.length) {
    added.forEach(id => {
      const info = findNodeIn(id, current);
      if (info) changes.push(`ADDED: "${info.name}"`);
    });
  }

  function findNodeIn(id, nodes) {
    for (const n of nodes) {
      if (n.id === id) return n;
      if (n.children) { const r = findNodeIn(id, n.children); if (r) return r; }
    }
    return null;
  }

  // Build readable structure
  function buildStructureText(nodes, indent) {
    let text = '';
    for (const n of nodes) {
      const prefix = '  '.repeat(indent);
      let line = prefix;
      if (n.type === 'root_tab') line += `[ROOT TAB] ${n.name}`;
      else if (n.type === 'subtab') line += `[SUB-TAB] ${n.name}`;
      else line += `- ${n.name}`;
      if (n.convar) line += `  (${n.convar})`;
      if (n.source) line += `  // ${n.source}`;
      text += line + '\n';
      if (n.children) text += buildStructureText(n.children, indent + 1);
    }
    return text;
  }

  const exportObj = {
    title: "VRMod Menu Reorganization Plan",
    exported_at: new Date().toISOString(),
    instruction: "This is the desired menu structure for vrmod_semioffcial_addonplus. Please reorganize the VRMod menu tabs and items to match this structure.",
    changes_summary: changes,
    new_structure_readable: buildStructureText(current, 0),
    new_structure_json: current
  };

  const text = `# VRMod Menu Reorganization Plan
# Exported: ${exportObj.exported_at}
#
# INSTRUCTION: Please reorganize the VRMod menu to match this structure.
# Each [ROOT TAB] becomes a top-level tab in the DPropertySheet.
# Each [SUB-TAB] becomes a nested tab within its parent.
# Items (-) are the settings/controls within each tab.
#
# Changes from original:
${changes.length ? changes.map(c => '# - ' + c).join('\n') : '# (no changes detected)'}

## Desired Structure:
${buildStructureText(current, 0)}
## JSON (for programmatic use):
${JSON.stringify(current, null, 2)}`;

  document.getElementById('exportText').value = text;
  document.getElementById('exportPanel').classList.add('visible');
  document.getElementById('exportOverlay').classList.add('visible');
}

function hideExport() {
  document.getElementById('exportPanel').classList.remove('visible');
  document.getElementById('exportOverlay').classList.remove('visible');
}

function copyExport() {
  const ta = document.getElementById('exportText');
  ta.select();
  navigator.clipboard.writeText(ta.value).then(() => {
    setStatus('Copied to clipboard!');
  }).catch(() => {
    document.execCommand('copy');
    setStatus('Copied to clipboard!');
  });
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'Delete') deleteSelected();
  if (e.key === 'F2') renameSelected();
  if (e.key === 'ArrowUp' && e.ctrlKey) { e.preventDefault(); moveUp(); }
  if (e.key === 'ArrowDown' && e.ctrlKey) { e.preventDefault(); moveDown(); }
});

// ============================================================
// INIT
// ============================================================
renderTree();
renderPreview();
setStatus('Ready. Drag tabs to reorder. Double-click to rename. Del to delete. Ctrl+Up/Down to move.');
</script>
</body>
</html>
